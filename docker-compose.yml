version: '3.8'

services:
  # Nginx Load Balancer
  loadbalancer:
    image: nginx:alpine
    container_name: kowlet-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - web
    restart: unless-stopped

  # Application (Next.js)
  web:
    build:
      context: .
      dockerfile: Dockerfile
    # Lưu ý: Đã xoá `container_name` để cho phép scale nhiều instances
    restart: unless-stopped
    # Chỉ expose port 3000 ở mạng nội bộ của Docker (không map ra máy host)
    expose:
      - "3000"
    env_file:
      - .env.production
    environment:
      - NODE_ENV=production
      - PORT=3000
      - HOSTNAME=0.0.0.0
