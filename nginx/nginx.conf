events {
    worker_connections 1024;
}

http {

    upstream nextjs_cluster {
        server web:3000;
    }

    server {
        listen 80;
        server_name kowlet.lehieuhoa.id.vn;

        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name kowlet.lehieuhoa.id.vn;

        ssl_certificate /etc/letsencrypt/live/kowlet.lehieuhoa.id.vn/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/kowlet.lehieuhoa.id.vn/privkey.pem;

        location / {
            proxy_pass http://nextjs_cluster;

            proxy_http_version 1.1;

            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";

            proxy_set_header Host $host;

            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header X-Forwarded-Host $host;
        }
    }
}